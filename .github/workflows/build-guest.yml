name: Build guest image

# Two-job workflow (v0.7.3+):
#   build       - runs on ubuntu-24.04-arm (native arm64). Fast, because
#                 apt/dpkg run at native speed with no qemu-user
#                 emulation.
#   smoke_publish - runs on ubuntu-latest (x86_64). Runs the packed
#                 qcow2 under qemu-system-aarch64 in pure TCG interpreter
#                 mode - which is exactly the stress path the device
#                 experiences (UTM-SE.ipa's qemu is a TCTI interpreter
#                 build; no JIT). Previous builds' smoke test ran on
#                 the arm64 runner where qemu-system-aarch64 defaults
#                 to TCG BUT the host is arm64 too, so timing looks
#                 different. Bun's JavaScriptCore GC race in v0.7.2 was
#                 masked by this - the smoke passed on CI, the app
#                 crashed on device. Splitting so the smoke matches
#                 device conditions.

on:
  push:
    branches: [main]
    paths:
      - "guest/**"
      - ".github/workflows/build-guest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build alpine-claude.qcow2
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    outputs:
      variant: ${{ steps.variant.outputs.variant }}
      version: ${{ steps.variant.outputs.version }}
      guest_os: ${{ steps.variant.outputs.guest_os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debian aarch64 rootfs (native arm64)
        run: |
          mkdir -p out
          docker run --rm \
            -v "$PWD/guest:/guest:ro" \
            -v "$PWD/out:/out" \
            debian:12-slim bash /guest/build-rootfs.sh
          sudo chmod -R a+r out

      - name: Create qcow2 disk image
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-utils zstd e2fsprogs
          sudo mkdir -p rootfs
          sudo tar -xpf out/rootfs.tar -C rootfs
          # v0.7.6: make a THIN 1.6 GB ext4 that fits just the rootfs
          # data, then grow the qcow2's max virtual size to 4 GB after
          # conversion. At boot /pocket-init runs `resize2fs /dev/vda`
          # which grows the ext4 live to fill the 4 GB block device.
          # Result: compressed IPA payload stays small, guest gets 4 GB
          # of usable space at first login. (Formatting a full 4 GB
          # ext4 then compressing wastes ~200 MB on inode metadata etc.)
          truncate -s 1600M disk.ext4
          sudo mkfs.ext4 -q -L alpine -d rootfs disk.ext4
          qemu-img convert -f raw -O qcow2 disk.ext4 alpine-claude.qcow2
          qemu-img resize alpine-claude.qcow2 4G
          zstd -19 -T0 alpine-claude.qcow2 -o alpine-claude.qcow2.zst
          echo "== qcow2 info =="
          qemu-img info alpine-claude.qcow2
          ls -lh alpine-claude.qcow2 alpine-claude.qcow2.zst out/

      - name: Read guest metadata
        id: variant
        run: |
          echo "variant=$(cat out/claude-variant.txt 2>/dev/null || echo unknown)" >> "$GITHUB_OUTPUT"
          echo "version=$(cat out/claude-version.txt 2>/dev/null || echo unknown)" >> "$GITHUB_OUTPUT"
          echo "guest_os=$(cat out/guest-os.txt 2>/dev/null || echo unknown)" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guest-image
          path: |
            alpine-claude.qcow2
            alpine-claude.qcow2.zst
            out/vmlinuz-virt
            out/initramfs-virt
            out/claude-variant.txt
            out/claude-version.txt
            out/guest-os.txt
          if-no-files-found: error
          retention-days: 1

  smoke_publish:
    name: Smoke test (x86_64 TCG) and publish
    needs: build
    runs-on: ubuntu-latest    # x86_64 - qemu-system-aarch64 runs in pure
                              # TCG interpreter mode here, no arm64 host
                              # optimisations. Matches on-device UTM-SE.
    timeout-minutes: 45

    steps:
      - name: Checkout (for smoke-test-qcow2.py)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: guest-image
          path: .

      - name: Install qemu-system-aarch64 (TCG interpreter)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends \
            qemu-system-arm python3

      - name: System-mode QEMU boot smoke test (TCG on x86_64)
        # v0.7.4: pass an explicit workspace dir so the smoke boots
        # with virtio-9p /workspace mounted, matching device conditions.
        # The dir gets pre-populated with a .claude skeleton (workflows,
        # sessions, logs, cache) so claude doesn't hit its "create dir"
        # code path first thing.
        run: |
          rm -rf /tmp/pocket-ws
          python3 guest/smoke-test-qcow2.py \
            alpine-claude.qcow2 out/vmlinuz-virt out/initramfs-virt \
            /tmp/pocket-ws

      - name: Publish guest-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: guest-latest
          name: "Guest image (rolling)"
          body: |
            aarch64 guest image for PocketDev, built from guest/.

            guest_os:       ${{ needs.build.outputs.guest_os }}
            claude_variant: ${{ needs.build.outputs.variant }}
            claude_version: ${{ needs.build.outputs.version }}

            Smoke test: ubuntu-latest (x86_64) + qemu-system-aarch64 TCG.
            This matches the on-device runtime characteristics of
            UTM-SE.ipa's TCTI-interpreter QEMU. If the smoke passes
            here, it should pass on device.

            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Assets:
            - alpine-claude.qcow2.zst - root disk (zstd), decompress before use
            - vmlinuz-virt / initramfs-virt - direct kernel boot files
          files: |
            alpine-claude.qcow2.zst
            out/vmlinuz-virt
            out/initramfs-virt
          prerelease: true
          make_latest: false
          draft: false
